name: Build App Android va iOS

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 1. Lay ma nguon tu kho
        uses: actions/checkout@v4

      - name: 2. Cai dat moi truong Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # BƯỚC MỚI THÊM VÀO: Yêu cầu tự động tạo khung xương Android/iOS bị thiếu
      - name: 3. Khoi tao cac thu muc Android va iOS bi thieu
        run: flutter create --org com.leanhbay .

      - name: 4. Tai cac thu vien can thiet
        run: flutter pub get

      - name: 5. Build file APK (Android)
        run: flutter build apk --release

      - name: 6. Build file iOS (Chua ky)
        run: flutter build ios --release --no-codesign

      - name: 7. Dong goi thanh file IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r app-security.ipa Payload

      - name: 8. Luu tru file de tai ve
        uses: actions/upload-artifact@v4
        with:
          name: App-Releases
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            app-security.ipa
